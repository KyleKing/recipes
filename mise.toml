[env]
_.file = { path = ".env" }

[tasks.compress]
description = "Compress image for performance. Requires a path"
run = "optimize-images -mh 900 --convert-all --force-delete"

[tasks.wayback]
description = "Update Wayback Machine Links. Optionally specify arguments (see 'mise run wayback --help')"
run = "./scripts/_update_wayback_links.py"

[tasks.link-images]
description = "Interactive tool to link recipe images. Optionally specify arguments (see 'mise run link-images --help')"
run = "./scripts/_link_images.py"

[tasks.browser-install]
description = "Install Playwright chromium-headless-shell (smaller than full chromium)"
run = "uvx playwright install chromium-headless-shell"

[tasks.build]
depends = ["format"]
description = "Build website"
run = "./scripts/build.sh"

[tasks.setup-spacy]
description = "Build go-spacy C++ wrapper library and generate .env"
run = "./scripts/setup-spacy.sh"

[tasks.format]
depends = ["setup-spacy"]
description = "Format (and generate) code"
run = ["templ generate", "templ fmt ./goBuild/", "go fmt ./..."]
sources = ['**/*.go', '**/*.templ', 'go.sum']

[tasks.format-djot]
description = "Format djot recipe files"
run = "fd -e dj . content/ -x djot-fmt -w {}"
sources = ['content/**/*.dj']

[tasks.format-js]
description = "Format and lint JavaScript/CSS files with biome"
run = "biome check --write content/_static/*.js content/styles.css"
sources = ['content/_static/**/*.js', 'content/**/*.css']

[tasks.lint]
depends = ["format"]
description = "Run linters"
run = "testifylint --enable-all ."
sources = ['**/*_test.go', 'go.sum']

[tasks.serve]
description = "Serve the built documentation"
run = "go run ./goServe/main.go --port=8000 --directory=./public"

[tasks.test]
depends = ["format", "lint"]
description = "Run test (snapshots in test_expected/ are auto-updated on mismatch; set FREEZE_SNAPSHOTS=1 to skip the update)"
# https://stackoverflow.com/a/21725603/3219667
run = "go test -coverprofile=coverage.out -coverpkg=./... -v ./..."
sources = ['**/*.go', 'go.sum']

[tasks."test:race"]
description = "Run tests with race detector"
run = "go test -race ./..."

[tasks.test-browser]
depends = ["build"]
description = "Run browser tests (requires server on :8000)"
run = "uv run scripts/test_browser.py -v"

[tasks.test-browser-auto]
description = "Run browser tests with auto server management"
run = "./scripts/run_browser_tests.sh"

[tasks.coverage]
description = "View test coverage of most recent test run"
# https://go.dev/blog/cover#heat-maps
run = "go tool cover -html=coverage.out"

[tasks."debug:inspect"]
description = "Inspect ingredient extraction for a recipe file"
run = ["go build -o ./bin/recipe_debug ./cmd/recipe_debug/main.go", "./bin/recipe_debug inspect"]

[tasks."debug:compare"]
description = "Compare two or more recipes pairwise"
run = ["go build -o ./bin/recipe_debug ./cmd/recipe_debug/main.go", "./bin/recipe_debug compare"]

[tasks.nits]
description = "Various nit fixes, like correcting `None`"
run = ["fd --exclude mise\\.toml | sad --exact --commit 'None' 'None'"]

[tasks.pre-push]
depends = ["build", "nits", "test"]
description = "Run all checks before pushing"

[tasks.lock]
description = "Regenerate mise.lock for all CI platforms"
run = "mise lock --platform linux-x64,macos-arm64"

[tasks.update]
depends = ["lock"]
description = "Update go dependencies"
run = ["go get -u .", "go mod tidy"]

[tools]
go = "1.25"
"go:github.com/Antonboom/testifylint" = "1.6.4"
"go:github.com/KyleKing/djot-fmt" = "latest"
"go:github.com/a-h/templ/cmd/templ" = "0.3.1020" # Keep insync with https://github.com/a-h/templ/releases and go.mod
"go:github.com/tdewolff/minify/v2/cmd/minify" = "latest"
"npm:@biomejs/biome" = "latest"
"npm:pagefind" = "latest"
"pipx:commitizen" = "latest"
"pipx:optimize-images" = "latest"
# PLANNED: remove click when: https://github.com/explosion/spaCy/pull/13973
python = { version = "3.13.12", postinstall = "python -m pip install spacy==3.8.14 click && python -m spacy download en_core_web_sm" }
taplo = "latest"
